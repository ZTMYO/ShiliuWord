    </div>

    <div id="toast" class="toast" aria-live="polite"></div>

    <dialog id="auth-dialog" class="auth-dialog">
      <div class="auth-card auth-entry-card auth-modal-card">
        <div class="auth-modal-head">
          <h2>欢迎</h2>
        </div>
        <p class="auth-subtitle">登录后即可同步历史、错题与收藏，支持多设备使用。</p>
        <div class="auth-switch" role="tablist" aria-label="登录注册切换">
          <button id="auth-login-tab-btn" type="button" class="auth-switch-btn is-active" aria-pressed="true">登录</button>
          <button id="auth-register-tab-btn" type="button" class="auth-switch-btn" aria-pressed="false">注册</button>
        </div>
        <form id="auth-form" class="auth-form" autocomplete="off">
          <input id="auth-username-input" class="password-input" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="用户名（3-24 位）" />
          <input id="auth-password-input" type="password" class="password-input" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="密码（至少 6 位）" />
          <input
            id="auth-confirm-input"
            type="password"
            class="password-input is-hidden"
            autocomplete="off"
            autocapitalize="none"
            autocorrect="off"
            spellcheck="false"
            placeholder="再次输入密码"
          />
          <button id="auth-submit-btn" type="submit" class="primary-btn password-submit-btn">登录</button>
        </form>
      </div>
    </dialog>

    <dialog id="result-dialog" class="result-dialog">
      <div class="dialog-header">
        <h3 id="result-dialog-title">答案解析</h3>
        <button id="close-dialog-btn" class="icon-btn" aria-label="关闭">
          <svg viewBox="0 0 20 20" aria-hidden="true">
            <path d="M5 5l10 10M15 5 5 15"></path>
          </svg>
        </button>
      </div>
      <div id="result-list" class="result-list"></div>
    </dialog>
  </body>
</html>
